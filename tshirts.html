<!DOCTYPE html>
<html>
<head>
  <title>T-Shirts Collection</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* HEADER */
    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    /* GALLERY */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      padding: 15px;
      justify-content: center;
    }

    .card {
      width: 45%;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      cursor: pointer;
    }

    .name {
      text-align: center;
      padding: 10px;
      font-weight: bold;
    }

    /* POPUP */
    #popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #popup img {
      max-width: 90%;
      max-height: 85%;
    }

    /* BACK BUTTON */
    .popup-back {
      position: absolute;
      top: 20px;
      left: 15px;
      background: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

  </style>
</head>

<body>

<header>
  T-Shirts Collection 👕
</header>

<div class="gallery">

  <div class="card">
    <img src="tshirt.png" onclick="openImage(this.src)">
    <div class="name">Casual T-Shirt</div>
  </div>

  <div class="card">
    <img src="tshirt2.jpg" onclick="openImage(this.src)">
    <div class="name">Printed T-Shirt</div>
  </div>

  <div class="card">
    <img src="tshirt3.png" onclick="openImage(this.src)">
    <div class="name">Oversized T-Shirt</div>
  </div>

  <div class="card">
    <img src="tshirt4.png" onclick="openImage(this.src)">
    <div class="name">Graphic T-Shirt</div>
  </div>

</div>

<!-- POPUP -->
<div id="popup">
  <button class="popup-back" onclick="closeImage()">⬅ Back</button>
  <img id="popupImg">
</div>

<script>
function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
